<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; min-width: 250px; background: #0B1120; color: #f8fafc; }
    button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 8px; }
    button:hover { background: #4338ca; }
    h3 { margin-top: 0; font-size: 16px; margin-bottom: 12px; }
    #status { font-size: 13px; color: #94a3b8; text-align: center; }
    .success { color: #4ade80 !important; }
    .error { color: #f87171 !important; }
  </style>
</head>
<body>
  <h3>AI Credit Helper</h3>
  <button id="openClaudeBtn">Open Claude</button>
  <button id="openGeminiBtn" style="background:#9333ea;">Open Gemini</button>
  <div id="status">Fetching recommendation...</div>
  <script src="popup.js"></script>
</body>
</html>
